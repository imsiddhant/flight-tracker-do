apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: flights-hyd
  labels:
    app: flights-hyd
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: flights-hyd
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
